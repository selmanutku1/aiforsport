name: Daily Sport AI Blogs

on:
  schedule:
    - cron: '0 6 * * *' # Runs at 06:00 UTC (09:00 TRT) every day
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm install openai
        
      - name: Generate Blogs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node .github/scripts/generate-blogs.js
        
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/blogs.json
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No new blogs generated. Skipping commit."
          else
            git commit -m "Auto-generated daily Sport AI blogs"
            git push
          fi
